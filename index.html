<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ZiltiQS • Code Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <!-- Barre latérale explorateur + console -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg>
          <span>ZiltiQS</span>
        </div>
        <span class="version">v2.0</span>
      </div>
      <div class="sidebar-section">
        <div class="section-title">EXPLORATEUR</div>
        <div class="file-tree" id="fileTree"></div>
        <button class="btn-new-item" id="btnNewFile" title="Nouveau fichier">+ Fichier</button>
        <button class="btn-new-item" id="btnNewFolder" title="Nouveau dossier">+ Dossier</button>
      </div>
      <div class="sidebar-actions">
        <button class="btn-download" id="btnDownloadProject">Télécharger le projet</button>
      </div>
      <div class="console-section">
        <div class="section-title">CONSOLE</div>
        <div class="console-output" id="consoleOutput"></div>
        <div class="console-input-row">
          <input type="text" id="consoleInput" placeholder="JS à exécuter…" autocomplete="off">
          <button id="btnConsoleRun" title="Exécuter">▶</button>
        </div>
        <button class="btn-clear-console" id="btnClearConsole">Effacer</button>
      </div>
    </aside>

    <!-- Zone éditeur -->
    <main class="editor-panel">
      <div class="tabs-bar" id="tabsBar"></div>
      <div class="find-bar hidden" id="findBar">
        <input type="text" id="findInput" placeholder="Rechercher…">
        <label><input type="checkbox" id="findRegex"> Regex</label>
        <label><input type="checkbox" id="findCase"> Sensible</label>
        <span id="findCount">0/0</span>
        <button id="btnFindPrev">↑</button>
        <button id="btnFindNext">↓</button>
        <button id="btnFindClose">✕</button>
      </div>
      <div class="editor-wrapper" id="editorWrapper">
        <div class="line-numbers" id="lineNumbers"></div>
        <div class="code-area">
          <pre id="codeHighlight" class="language-html"></pre>
          <textarea id="codeInput" spellcheck="false" placeholder="Commencez à coder…"></textarea>
        </div>
      </div>
    </main>

    <!-- Projecteur -->
    <section class="projector-panel">
      <div class="projector-header">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="projector-url">ziltiqs.local/projecteur</span>
        <button class="btn-refresh" id="btnRefreshProjector">⟳</button>
      </div>
      <div class="projector-frame-container">
        <iframe id="projectorFrame" sandbox="allow-scripts" title="Projecteur ZiltiQS"></iframe>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
